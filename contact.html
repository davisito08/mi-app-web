<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacto — GravityLab</title>
  <link rel="stylesheet" href="css/styles.css?v=2" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    .page-header { padding: 120px 0 60px; background: var(--grad-hero); text-align: center; }
    .content-section { padding: 60px 0; max-width: 600px; margin: 0 auto; }
    .card-info { background: var(--grad-card); border: 1px solid var(--clr-border); border-radius: var(--r-lg); padding: var(--space-xl); margin-bottom: var(--space-lg); text-align: center; }
    h2 { color: var(--clr-primary); margin-bottom: 1rem; }
    p { margin-bottom: 1.2rem; color: var(--clr-text-muted); }
    .contact-email { font-size: 1.5rem; color: var(--clr-accent); font-weight: bold; margin: 1rem 0; display: block; }
  </style>
</head>
<body>
  <header class="navbar scrolled">
    <div class="nav-container">
      <a href="index.html" class="nav-brand">
        <span class="nav-brand-text">Gravity<em>Lab</em></span>
      </a>
      <nav class="nav-links">
        <a href="index.html" class="nav-link">Inicio</a>
      </nav>
    </div>
  </header>

  <section class="page-header">
    <div class="container">
      <h1 class="hero-title">Contacto</h1>
      <p class="hero-subtitle">¿Tienes alguna duda? Estamos aquí para ayudarte.</p>
    </div>
  </section>

  <main class="content-section container">
    <div class="card-info">
      <h2>📬 ¡Hablemos!</h2>
      <a href="mailto:soporte@gravitylab.test" class="contact-email">soporte@gravitylab.test</a>
      <p>Estamos disponibles para resolver cualquier duda sobre el simulador.</p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner" style="justify-content: center;">
      <p class="footer-copy">&copy; 2026 GravityLab · Soporte al Usuario</p>
    </div>
  </footer>
</body>
</html>
